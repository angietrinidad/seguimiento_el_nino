project:
  type: website
  output-dir: _site
  # Ejecutar todo el código con la raíz del proyecto como directorio de trabajo,
  # para que las rutas a datos/*.csv sean idénticas en todas las páginas.
  execute-dir: project
  # Normaliza las contrabarras de Windows en los stubs de redirección (aliases).
  post-render: scripts/fix_redirects.py
  # Renderizar solo las páginas .qmd (excluye docs .md: README.md, CLAUDE.md).
  render:
    - "*.qmd"
    - "**/*.qmd"
  resources:
    - datos/exposicion/escuelas_riesgo.xlsx
    - datos/exposicion/salud_riesgo.xlsx
    - datos/exposicion/comercio_riesgo.xlsx
    - informes/informe-elnino-facso-una.docx

website:
  title: "Desastres Anunciados"
  favicon: assets/favicon.png
  image: assets/logo_card.png
  description: >-
    Riesgo de desastres en Paraguay desde una mirada crítica: desastres previsibles
    y socialmente construidos. Base empírica sobre amenazas (inundación fluvial y
    pluvial, sequía, frío, dengue, incendios), exposición y vulnerabilidad, con
    fuentes oficiales y datos primarios.
  site-url: "https://desastresanunciados.org"
  # Repo privado: sin enlaces públicos "editar/ver fuente/issue" (darían 404).
  page-navigation: true
  reader-mode: true
  search: true
  navbar:
    background: light
    logo: assets/navbar_logo.png
    logo-alt: "Desastres Anunciados"
    title: false
    left:
      - text: "Inicio"
        file: index.qmd
      - text: "Marco"
        file: marco/index.qmd
      - text: "Amenazas"
        menu:
          - text: "▸ Todas las amenazas"
            file: amenazas/index.qmd
          - text: "🌊 Inundación fluvial (río)"
            file: amenazas/inundacion-fluvial/index.qmd
          - text: "🌧️ Inundación pluvial (lluvia)"
            file: amenazas/inundacion-pluvial/index.qmd
          - text: "🏜️ Sequía y bajante del río"
            file: amenazas/sequia/index.qmd
          - text: "❄️ Olas de frío (Jaho'i)"
            file: amenazas/frio/index.qmd
          - text: "🦟 Dengue y salud climática"
            file: amenazas/dengue/index.qmd
          - text: "🔥 Incendios y quemas"
            file: amenazas/incendios/index.qmd
      - text: "Exposición"
        menu:
          - text: "Población, salud, educación y comercio"
            file: exposicion/index.qmd
          - text: "Agricultura y ganadería (medios de vida)"
            file: agro-ganaderia/index.qmd
      - text: "Situación actual"
        file: situacion-actual/index.qmd
      - text: "Recomendaciones"
        file: recomendaciones/index.qmd
      - text: "Contexto ENOS"
        menu:
          - text: "América Latina (panorama regional)"
            file: contexto-america-latina/index.qmd
          - text: "Paraguay (nacional)"
            file: contexto-paraguay/nacional.qmd
          - text: "Paraguay por departamento"
            file: contexto-paraguay/departamentos/index.qmd
          - text: "Asunción y área metropolitana"
            file: contexto-asuncion/index.qmd
      - text: "Fuentes"
        file: fuentes/index.qmd
  sidebar:
    style: docked
    contents:
      - text: "🏠 Panel de control"
        file: index.qmd
      - text: "🧭 Marco (desastres anunciados)"
        file: marco/index.qmd
      - section: "⚠️ Amenazas"
        contents:
          - text: "Todas las amenazas"
            file: amenazas/index.qmd
          - text: "Inundación fluvial (río)"
            file: amenazas/inundacion-fluvial/index.qmd
          - text: "Inundación pluvial (lluvia)"
            file: amenazas/inundacion-pluvial/index.qmd
          - text: "Sequía y bajante del río"
            file: amenazas/sequia/index.qmd
          - text: "Olas de frío (Jaho'i)"
            file: amenazas/frio/index.qmd
          - text: "Dengue y salud climática"
            file: amenazas/dengue/index.qmd
          - text: "Incendios y quemas"
            file: amenazas/incendios/index.qmd
      - section: "👥 Exposición y situación"
        contents:
          - text: "Exposición y vulnerabilidad"
            file: exposicion/index.qmd
          - text: "Agricultura y ganadería (medios de vida)"
            file: agro-ganaderia/index.qmd
          - text: "Situación actual (2026-27)"
            file: situacion-actual/index.qmd
          - text: "Recomendaciones"
            file: recomendaciones/index.qmd
      - section: "📚 Contexto histórico (ENOS)"
        contents:
          - text: "América Latina (panorama regional)"
            file: contexto-america-latina/index.qmd
          - text: "Paraguay (nivel nacional)"
            file: contexto-paraguay/nacional.qmd
          - text: "Impacto por departamento"
            file: contexto-paraguay/departamentos/index.qmd
          - text: "Asunción y área metropolitana"
            file: contexto-asuncion/index.qmd
      - section: "Anexos"
        contents:
          - metodologia.qmd
          - fuentes/index.qmd

format:
  html:
    theme:
      - cosmo
      - brand-custom.scss
      - styles.scss
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    toc: true
    toc-title: "En esta página"
    toc-depth: 3
    number-sections: false
    code-fold: true
    code-tools: true
    df-print: paged
    lang: es

bibliography: referencias.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl
lang: es

execute:
  freeze: auto
  warning: false
