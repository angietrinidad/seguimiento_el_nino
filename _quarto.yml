project:
  type: website
  output-dir: _site
  # Ejecutar todo el código con la raíz del proyecto como directorio de trabajo,
  # para que las rutas a datos/*.csv sean idénticas en todas las páginas.
  execute-dir: project
  resources:
    - datos/exposicion/escuelas_riesgo.xlsx
    - datos/exposicion/salud_riesgo.xlsx

website:
  title: "Desastres Construidos"
  description: >-
    Riesgo de desastres en Paraguay desde una mirada crítica: el desastre como
    construcción social. Base empírica sobre amenazas (inundación fluvial y pluvial,
    y otras), exposición y vulnerabilidad, con fuentes oficiales y datos primarios.
  site-url: "https://angietrinidad.github.io/seguimiento_el_nino/"
  repo-url: "https://github.com/angietrinidad/seguimiento_el_nino"
  repo-actions: [edit, source, issue]
  page-navigation: true
  reader-mode: true
  search: true
  navbar:
    background: primary
    left:
      - text: "Inicio"
        file: index.qmd
      - text: "Marco"
        file: 01-marco-conceptual/index.qmd
      - text: "Amenazas"
        menu:
          - text: "🌊 Inundación fluvial (río)"
            file: 05-mapa-riesgo/index.qmd
          - text: "🌧️ Inundación pluvial (lluvia)"
            file: 08-pluvial/index.qmd
          - text: "🏜️ Sequía y bajante del río"
            file: amenazas/sequia/index.qmd
          - text: "❄️ Olas de frío (Jaho'i)"
            file: amenazas/frio/index.qmd
          - text: "🦟 Dengue y salud climática"
            file: amenazas/dengue/index.qmd
          - text: "🔥 Incendios y quemas"
            file: amenazas/incendios/index.qmd
      - text: "Exposición"
        file: 06-exposicion/index.qmd
      - text: "Situación actual"
        file: situacion-actual/index.qmd
      - text: "Recomendaciones"
        file: 07-recomendaciones/index.qmd
      - text: "Contexto ENOS"
        menu:
          - text: "América Latina (panorama regional)"
            file: 02-america-latina/index.qmd
          - text: "Paraguay (nacional)"
            file: 03-paraguay/nacional.qmd
          - text: "Paraguay por departamento"
            file: 03-paraguay/departamentos/index.qmd
          - text: "Asunción y área metropolitana"
            file: 04-asuncion-metropolitana/index.qmd
      - text: "Fuentes"
        file: fuentes/index.qmd
  sidebar:
    style: docked
    contents:
      - text: "🏠 Panel de control"
        file: index.qmd
      - text: "🧭 Marco: desastres construidos"
        file: 01-marco-conceptual/index.qmd
      - section: "⚠️ Amenazas"
        contents:
          - text: "Inundación fluvial (río)"
            file: 05-mapa-riesgo/index.qmd
          - text: "Inundación pluvial (lluvia)"
            file: 08-pluvial/index.qmd
          - text: "Sequía y bajante del río"
            file: amenazas/sequia/index.qmd
          - text: "Olas de frío (Jaho'i)"
            file: amenazas/frio/index.qmd
          - text: "Dengue y salud climática"
            file: amenazas/dengue/index.qmd
          - text: "Incendios y quemas"
            file: amenazas/incendios/index.qmd
      - section: "👥 Exposición y situación"
        contents:
          - text: "Exposición y vulnerabilidad"
            file: 06-exposicion/index.qmd
          - text: "Situación actual (2026-27)"
            file: situacion-actual/index.qmd
          - text: "Recomendaciones"
            file: 07-recomendaciones/index.qmd
      - section: "📚 Contexto histórico (ENOS)"
        contents:
          - text: "América Latina (panorama regional)"
            file: 02-america-latina/index.qmd
          - text: "Paraguay (nivel nacional)"
            file: 03-paraguay/nacional.qmd
          - text: "Impacto por departamento"
            file: 03-paraguay/departamentos/index.qmd
          - text: "Asunción y área metropolitana"
            file: 04-asuncion-metropolitana/index.qmd
      - section: "Anexos"
        contents:
          - metodologia.qmd
          - fuentes/index.qmd

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    toc-title: "En esta página"
    toc-depth: 3
    number-sections: false
    code-fold: true
    code-tools: true
    df-print: paged
    lang: es

bibliography: referencias.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl
lang: es

execute:
  freeze: auto
  warning: false
