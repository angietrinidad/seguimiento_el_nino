project:
  type: website
  output-dir: _site
  # Ejecutar todo el código con la raíz del proyecto como directorio de trabajo,
  # para que las rutas a datos/*.csv sean idénticas en todas las páginas.
  execute-dir: project

website:
  title: "Seguimiento El Niño (ENOS)"
  description: >-
    Repositorio documental sobre el fenómeno El Niño-Oscilación del Sur (ENOS)
    con foco en América Latina, Paraguay y el área metropolitana de Asunción.
  site-url: "https://angietrinidad.github.io/seguimiento_el_nino/"
  repo-url: "https://github.com/angietrinidad/seguimiento_el_nino"
  repo-actions: [edit, source, issue]
  page-navigation: true
  reader-mode: true
  search: true
  navbar:
    background: primary
    left:
      - text: "Inicio"
        file: index.qmd
      - text: "Marco conceptual"
        file: 01-marco-conceptual/index.qmd
      - text: "Antecedentes históricos"
        menu:
          - text: "América Latina (panorama regional)"
            file: 02-america-latina/index.qmd
          - text: "Paraguay (nacional)"
            file: 03-paraguay/nacional.qmd
          - text: "Paraguay por departamento"
            file: 03-paraguay/departamentos/index.qmd
          - text: "Asunción y área metropolitana"
            file: 04-asuncion-metropolitana/index.qmd
          - text: "Mapa histórico de inundaciones"
            file: 05-mapa-riesgo/index.qmd
      - text: "Situación actual (2026-27)"
        menu:
          - text: "Estado del episodio 2026-27"
            file: situacion-actual/index.qmd
          - text: "Exposición y población en riesgo"
            file: 06-exposicion/index.qmd
      - text: "Fuentes"
        file: fuentes/index.qmd
  sidebar:
    style: docked
    contents:
      - index.qmd
      - section: "Marco conceptual"
        contents:
          - text: "Qué es el ENOS"
            file: 01-marco-conceptual/index.qmd
      - section: "Antecedentes históricos"
        contents:
          - text: "América Latina (panorama regional)"
            file: 02-america-latina/index.qmd
          - text: "Paraguay (nivel nacional)"
            file: 03-paraguay/nacional.qmd
          - text: "Impacto por departamento"
            file: 03-paraguay/departamentos/index.qmd
          - text: "Asunción y área metropolitana"
            file: 04-asuncion-metropolitana/index.qmd
          - text: "Mapa histórico de inundaciones"
            file: 05-mapa-riesgo/index.qmd
      - section: "Situación actual (2026-27)"
        contents:
          - text: "Estado del episodio en curso"
            file: situacion-actual/index.qmd
          - text: "Exposición y población en riesgo"
            file: 06-exposicion/index.qmd
      - section: "Anexos"
        contents:
          - metodologia.qmd
          - fuentes/index.qmd

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    toc-title: "En esta página"
    toc-depth: 3
    number-sections: false
    code-fold: true
    code-tools: true
    df-print: paged
    lang: es

bibliography: referencias.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl
lang: es

execute:
  freeze: auto
  warning: false
