iso3: PRY
category:
  name: education_facilities
  formats:
  - gpkg
  - shp
  - geojson
  - kml
  skip_pcodes: false
  boundary_resolution: null
  hdx:
    title: Education Facilities
    notes: 'Education facilities from OSM. Includes schools, kindergartens, colleges,
      and universities tagged via `amenity` or `building`. Useful for school-access
      mapping, education planning, and resource allocation.


      OpenStreetMap is a free, collaborative world map built by volunteers. Completeness
      varies by region: urban areas are usually well-mapped, remote areas may be incomplete.
      Cross-check critical decisions with local field knowledge.


      - Source: [OpenStreetMap](https://www.openstreetmap.org)

      - OSM tags: [Key:amenity](https://wiki.openstreetmap.org/wiki/Key:amenity),
      [Key:building](https://wiki.openstreetmap.org/wiki/Key:building)

      - Part of many  [exports grid on HDX](https://data.humdata.org/organization/hot)
      by the [HOT](https://www.hotosm.org/en/)

      '
    tags:
    - education facilities-schools
    - geodata
    license: hdx-odc-odbl
    license_url: https://opendatacommons.org/licenses/odbl/1-0/
    caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive
    dataset_source: OpenStreetMap contributors
  overture:
    enabled: true
    theme: places
    feature_type: place
    select:
    - id
    - names.primary AS name
    - names.common->>'en' AS name_en
    - categories.primary AS amenity
    - addresses[1].freeform AS addr_full
    - sources[1].dataset AS source
    - update_time AS update_time
    where:
    - categories.primary IN ('school', 'university', 'college', 'kindergarten')
  osm:
    enabled: true
    select:
    - feature_id AS id
    - tags['name'] AS name
    - tags['name:en'] AS name_en
    - tags['amenity'] AS amenity
    - tags['building'] AS building
    - tags['operator:type'] AS operator_type
    - tags['capacity:persons'] AS capacity_persons
    - tags['addr:full'] AS addr_full
    - tags['addr:city'] AS addr_city
    - tags['source'] AS source
    where: []
    filter:
      amenity:
      - kindergarten
      - school
      - college
      - university
      building:
      - kindergarten
      - school
      - college
      - university
  transliterate:
  - target: name_latin
    source: name
    prefer: name_en
  temporal:
    column: update_time
source: osm
